services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finadvisor
      POSTGRES_USER: finadvisor
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finadvisor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finadvisor:localdev@postgres:5432/finadvisor
      KONG_URL: http://kong:8000
      LANGFUSE_HOST: http://langfuse:3000
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      PII_MODE: regex
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  litellm:
    build: ./litellm
    ports:
      - "4000:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}

  kong:
    build: ./kong
    ports:
      - "8001:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    depends_on:
      - litellm

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-langfuse-dev-secret}
      NEXTAUTH_URL: http://localhost:3030
      LANGFUSE_INIT_ORG_ID: finadvisor
      LANGFUSE_INIT_PROJECT_ID: finadvisor-dev
    depends_on:
      langfuse-db:
        condition: service_healthy

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    ports:
      - "5433:5432"
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  langfuse_pgdata:
  redisdata:
