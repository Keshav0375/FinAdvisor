services:
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-langfuse-dev-secret}
      NEXTAUTH_URL: http://localhost:3030
      SALT: ${LANGFUSE_SALT:-langfuse-dev-salt}
      LANGFUSE_INIT_ORG_ID: finadvisor
      LANGFUSE_INIT_PROJECT_ID: finadvisor-dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-finadvisor-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-finadvisor-dev
      LANGFUSE_INIT_USER_EMAIL: admin@finadvisor.local
      LANGFUSE_INIT_USER_PASSWORD: admin123
      LANGFUSE_INIT_USER_NAME: Admin
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    ports:
      - "5433:5432"
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  langfuse_pgdata:
